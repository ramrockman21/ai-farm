<!DOCTYPE html>
<html>
<head>
    <title>AI Farmer Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌾 AI Farmer Assistant</h1>

    <select id="crop">
        <option>Banana</option>
        <option>Rice</option>
        <option>Tomato</option>
    </select>

    <input type="text" id="question" placeholder="Ask your question..." />

    <input type="file" id="image" />

    <div>
        <button onclick="askAI()">Ask</button>
        <button onclick="startVoice()">🎤 Speak</button>
        <button onclick="escalate()">📞 Escalate</button>
    </div>

    <p id="answer"></p>
</div>

<script src="script.js"></script>

</body>
</html>
